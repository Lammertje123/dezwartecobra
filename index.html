<!DOCTYPE html>
<html lang="nl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>De Zwarte Cobra Radio</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at top, #0a0a0a, #000);
  font-family:Orbitron, sans-serif;
  color:white;
}

.card{
  width:400px;
  background:rgba(10,10,10,0.95);
  border:1px solid #ff0000;
  border-radius:28px;
  padding:28px;
  box-shadow:0 0 60px rgba(255,0,0,0.25);
  text-align:center;
}

.logo{ font-size:55px; }

h1{
  font-size:16px;
  color:#ff0000;
  letter-spacing:3px;
  margin:10px 0;
}

.status{ font-size:13px; margin:10px 0; }
.live{ color:#00ff66; }
.offline{ color:#ff4444; }
.warn{ color:#ffaa00; }

.now{ font-size:12px; opacity:0.85; margin-top:6px; }

button{
  margin-top:12px;
  background:linear-gradient(45deg,#ff0000,#5a0000);
  border:none;
  padding:13px 22px;
  color:white;
  border-radius:14px;
  cursor:pointer;
  font-size:14px;
}

button:hover{ transform:scale(1.05); }

input[type=range]{
  width:100%;
  margin-top:10px;
}

.eq{
  display:flex;
  justify-content:center;
  gap:3px;
  height:30px;
  margin-top:15px;
}

.bar{
  width:4px;
  background:#ff0000;
  animation:bounce 1s infinite;
}

.bar:nth-child(2){animation-delay:.2s}
.bar:nth-child(3){animation-delay:.4s}
.bar:nth-child(4){animation-delay:.6s}

@keyframes bounce{
  0%,100%{height:5px}
  50%{height:30px}
}

.small{
  font-size:10px;
  opacity:0.5;
  margin-top:12px;
}

.badge{
  font-size:10px;
  margin-top:6px;
  opacity:0.7;
}
</style>
</head>

<body>

<div class="card">
  <div class="logo">🐍</div>
  <h1>DE ZWARTE COBRA</h1>

  <div id="status" class="live">🟢 ONLINE</div>
  <div class="now" id="now">🎵 Connecting stream...</div>
  <div class="badge" id="net">📡 SYSTEM READY</div>

  <audio id="radio" preload="none"></audio>

  <button onclick="toggle()">▶ PLAY / STOP</button>

  <div>
    🔊 Volume
    <input type="range" id="vol" min="0" max="1" step="0.01" value="0.8">
  </div>

  <div class="eq">
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
  </div>

  <div class="small">BROADCAST SYSTEM • LIVE STREAM ENGINE</div>
</div>

<script>

const audio = document.getElementById("radio");
const status = document.getElementById("status");
const now = document.getElementById("now");
const net = document.getElementById("net");
const vol = document.getElementById("vol");

let playing = false;
let watchdog;

// volume
vol.addEventListener("input", ()=> audio.volume = vol.value);

// toggle
function toggle(){
  if(!playing){
    start();
  } else {
    stop();
  }
}

// START STREAM
function start(){

  net.innerHTML = "📡 CONNECTING...";
  status.className = "status warn";
  status.innerHTML = "🟡 CONNECTING";

  audio.src = "https://stream.dezwartecobra.nl/stream";

  audio.play().then(()=>{

    playing = true;

    status.className = "status live";
    status.innerHTML = "🟢 LIVE";

    net.innerHTML = "📡 STREAM ACTIVE";

    startWatchdog();
    fetchNowPlaying();

  }).catch(()=>{

    status.className = "status offline";
    status.innerHTML = "❌ STREAM ERROR";
    net.innerHTML = "📡 CONNECTION FAILED";

  });
}

// STOP
function stop(){
  audio.pause();
  playing = false;

  status.className = "status offline";
  status.innerHTML = "🔴 OFFLINE";

  net.innerHTML = "📡 SYSTEM READY";

  clearInterval(watchdog);
}

// watchdog
function startWatchdog(){
  clearInterval(watchdog);

  watchdog = setInterval(()=>{
    if(playing && audio.paused){
      net.innerHTML = "🔄 RECONNECTING...";
      audio.play().catch(()=>{});
    }
  }, 4000);
}

// metadata
async function fetchNowPlaying(){
  try{
    const res = await fetch("http://86.85.200.210:8000/status-json.xsl");
    const data = await res.json();

    let source = data.icestats.source;
    let title = source?.title || "Live Stream";

    now.innerHTML = "🎵 Now Playing: " + title;
    net.innerHTML = "📡 METADATA LIVE";

  } catch(e){
    now.innerHTML = "🎵 Now Playing: Live Stream";
    net.innerHTML = "📡 METADATA OFFLINE";
  }
}

// init
audio.volume = 0.8;

</script>

</body>
</html>
